<!DOCTYPE html>
<html lang="en">
  <head>
    <title>CSE 183 Assignment 1</title>
    <meta charset="UTF-8" />
    <!-- Bulma css -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
  </head>
  <body>
    <!--header-->
    <header>
      <div class="hero is-primary">
        <div class="hero-body">
          <h1 class="title">CSE 183 Assignment 1 by Rachel (Younwoo) Park</h1>
        </div>
      </div>
    </header>
    <!--top section-->
    <section class="section top">
      <div class="container">
        <img src="./cat.jpg" alt="cat image" width="500" />
      </div>
    </section>

    <!--bottom section-->
    <section class="section bottom">
      <!--6 columns -->
      <div class="container">
        <div class="columns">
          <!--primary-->
          <div class="column">
            <div class="card">
              <div class="card-header">
                <p class="card-header-title">Primary</p>
              </div>
              <div class="card-content">
                <div class="content">
                  <p>This is the primary card</p>
                  <button class="button is-primary">Primary</button>
                </div>
              </div>
            </div>
          </div>

          <!--link-->
          <div class="column">
            <div class="card">
              <div class="card-header">
                <p class="card-header-title">Link</p>
              </div>
              <div class="card-content">
                <div class="content">
                  <p>This is the link card</p>
                  <button class="button is-link">Link</button>
                </div>
              </div>
            </div>
          </div>

          <!--info-->
          <div class="column">
            <div class="card">
              <div class="card-header">
                <p class="card-header-title">Info</p>
              </div>
              <div class="card-content">
                <div class="content">
                  <p>This is the info card</p>
                  <button class="button is-info">Info</button>
                </div>
              </div>
            </div>
          </div>

          <!--success-->
          <div class="column">
            <div class="card">
              <div class="card-header">
                <p class="card-header-title">Success</p>
              </div>
              <div class="card-content">
                <div class="content">
                  <p>This is the success card</p>
                  <button class="button is-success">Success</button>
                </div>
              </div>
            </div>
          </div>

          <!--warning-->
          <div class="column">
            <div class="card">
              <div class="card-header">
                <p class="card-header-title">Warning</p>
              </div>
              <div class="card-content">
                <div class="content">
                  <p>This is the warning card</p>
                  <button class="button is-warning">Warning</button>
                </div>
              </div>
            </div>
          </div>

          <!--danger-->
          <div class="column">
            <div class="card">
              <div class="card-header">
                <p class="card-header-title">Danger</p>
              </div>
              <div class="card-content">
                <div class="content">
                  <p>This is the danger card</p>
                  <button class="button is-danger">Danger</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!--footer-->
    <footer>
      <div class="container is-centered">
        <a href="mailto:ypark55@ucsc.edu">Rachel (Younwoo) Park</a>
      </div>
    </footer>
  </body>
</html>
